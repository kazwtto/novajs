<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
        <title>NOVAjs — Playground</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" type="image/png" href="icon.png">
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background-color: var(--bg);
                color: var(--text);
                font-family: var(--font-body);
                width: 100dvw;
                height: 100dvh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            header {
                background: var(--surface);
                padding: 0 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid var(--border);
                height: var(--header-h);
                flex-shrink: 0;
            }
            .layout {
                margin: 0;
            }
            .header-controls {
                display: flex;
                align-items: center;
                gap: 15px;
            }
            .auto-run-wrapper {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 12px;
                color: var(--muted);
                font-weight: bold;
            }
            .switch {
                position: relative;
                display: inline-block;
                width: 34px;
                height: 20px;
            }
            .switch input { opacity: 0; width: 0; height: 0; }
            .slider {
                position: absolute;
                cursor: pointer;
                top: 0; left: 0; right: 0; bottom: 0;
                background-color: var(--border-2);
                transition: .3s;
                border-radius: 20px;
            }
            .slider:before {
                position: absolute;
                content: "";
                height: 14px;
                width: 14px;
                left: 3px;
                bottom: 3px;
                background-color: var(--surface);
                transition: .3s;
                border-radius: 50%;
            }
            input:checked + .slider { background-color: var(--accent); }
            input:checked + .slider:before { transform: translateX(14px); }
            button[id="run-btn"] {
                background: var(--accent);
                color: var(--surface);
                border: none;
                padding: 6px 16px;
                border-radius: var(--radius);
                font-weight: bold;
                cursor: pointer;
                font-family: var(--font-body);
            }
            .layout {
                display: flex;
                flex: 1;
                height: calc(100vh - var(--header-h));
                flex-direction: column;
            }
            #editor-section, #output-section {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            #editor-container {
                flex: 1;
                position: relative;
            }
            #code {
                position: absolute;
                top: 0; bottom: 0; left: 0; right: 0;
            }
            #tabs {
                display: flex;
                background: var(--surface);
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
            }
            .tab {
                padding: 10px 20px;
                cursor: pointer;
                font-size: 12px;
                font-family: var(--font-mono);
                color: var(--muted);
                border-bottom: 2px solid transparent;
            }
            .tab.active {
                color: var(--accent);
                border-bottom-color: var(--accent);
            }
            #output-container {
                flex: 1;
                position: relative;
                background: var(--surface);
            }
            .panel {
                display: none;
                width: 100%;
                height: 100%;
                border: none;
                position: absolute;
                top: 0; left: 0;
            }
            .panel.active {
                display: block;
            }
            #console {
                padding: 10px;
                font-family: var(--font-mono);
                font-size: 13px;
                overflow-y: auto;
                background: var(--code-bg);
                color: var(--code-text);
                word-wrap: break-word;
                white-space: pre-wrap;
            }
            .log-line {
                margin-bottom: 5px;
                padding-bottom: 5px;
                border-bottom: 1px solid var(--border-2);
            }
            .log-error {
                color: var(--accent-2);
            }
            .playground-subheader {
                display: flex;
                align-items: center;
                gap: 16px;
            }

            .log-error { color: #ff4d4f; }
            .log-warn { color: #faad14; }
            .log-info { color: #1890ff; }
            .log-debug { color: #8c8c8c; }

            @media (min-width: 768px) {
                .layout {
                    flex-direction: row;
                }
                #editor-section {
                    border-right: 1px solid var(--border);
                }
                #tabs {
                    border-top: none;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <div class="playground-subheader">
                <a href="#" class="header-logo"> <img src="icon.png" /> NOVAjs </a>
                <div class="header-tagline">
                    Try any code if you want
                </div>
            </div>
            <div class="header-controls">
                <label class="auto-run-wrapper">
                    AUTO
                    <label class="switch">
                        <input type="checkbox" id="auto-run-switch">
                        <span class="slider"></span>
                    </label>
                </label>
                <button id="run-btn">RUN</button>
            </div>
        </header>

        <div class="layout">
            <div id="editor-section">
                <div id="editor-container">
                    <div id="code">hello = "Hello, World!";

print(hello);

el = dom.create("span", {
    text: hello,
    style: { textAlign: "center", margin: "auto" }
});

dom.body.append(el);</div>
                </div>
            </div>
            <div id="output-section">
                <div id="tabs">
                    <div class="tab active" data-target="preview">PREVIEW</div>
                    <div class="tab" data-target="console">CONSOLE</div>
                </div>
                <div id="output-container">
                    <iframe id="preview" class="panel active"></iframe>
                    <div id="console" class="panel"></div>
                </div>
            </div>
        </div>

        <script>
            const editor = ace.edit("code");
            //editor.setTheme("ace/theme/chrome"); 
            editor.setOptions({
                fontSize: "14px",
                showPrintMargin: false,
                wrap: false,
                useWorker: false 
            });
            
ace.config.loadModule("ace/mode/typescript", function (ts) {
                const oop = ace.require("ace/lib/oop");
                const TextHighlightRules = ace.require("ace/mode/text_highlight_rules").TextHighlightRules;
            
                const NovaHighlightRules = function () {
                    TextHighlightRules.call(this);
            
                    const keywords = [
                        "let","const","var",
                        "if","else","for","while","do",
                        "return","break","continue",
                        "func","function","fn","class","new","this","super",
                        "true","false","null","undefined",
                        "import","export","default","from","as",
                        "try","catch","finally","throw",
                        "typeof","instanceof","in","of","delete","void",
                        "async","await","yield",
                        "switch","case",
                        "print","not","and","or","equal","isNot",
                        "greaterThan","lessThan","greaterEqual","lessEqual",
                        "notEqual","range","dom","canvas","is",
                    ].join("|");
            
                    const builtins = [
                        "random","randomInt","clamp","lerp","norm",
                        "deg2rad","rad2deg","dist","dist3","sign","frac","mod",
                        "smoothstep","smootherstep","mix",
                        "gcd","lcm","isPrime","factorial","fibonacci",
                        "log2","log10","loge","sqrt","abs",
                        "file","fileAsync",
                        "parseInt","parseFloat","isNaN","isFinite",
                        "JSON","Math","Object","Array","String","Number",
                        "Boolean","Promise","Error","TypeError","console",
                    ].join("|");
            
                    const types = [
                        "string","number","boolean","any","void","never","unknown",
                        "object","symbol","bigint","null","undefined",
                        "int","float","double","char","byte","short","long",
                    ].join("|");
            
                    const printMethods = "log|warn|error|info|debug|table|dir|group|groupEnd|groupCollapsed|time|timeEnd|count|assert|trace";
            
                    const keywordMapper = this.createKeywordMapper(
                        {
                            "keyword": keywords,
                            "support.function": builtins,
                            "storage.type": types,
                        },
                        "identifier",
                        true
                    );
            
                    this.$rules = {
                        "start": [
                            // single-line comment
                            {
                                token: "comment",
                                regex: "\\/\\/.*$",
                            },
                            // block comment
                            {
                                token: "comment",
                                regex: "\\/\\*",
                                next: "comment_block",
                            },
                            // strings double
                            {
                                token: "string",
                                regex: '"',
                                next: "string_double",
                            },
                            // strings single
                            {
                                token: "string",
                                regex: "'",
                                next: "string_single",
                            },
                            // template literal
                            {
                                token: "string",
                                regex: "`",
                                next: "string_template",
                            },
                            // numbers
                            {
                                token: "constant.numeric",
                                regex: "\\b(?:0x[\\da-fA-F]+|\\d+(?:\\.\\d+)?(?:[eE][+-]?\\d+)?)\\b",
                            },
                            // print.method
                            {
                                token: ["keyword", "punctuation.operator", "entity.name.function.nova-print-method"],
                                regex: "\\b(print)(\\.)(" + printMethods + ")\\b",
                            },
                            // print: method( or print:method(
                            {
                                token: ["keyword", "punctuation.operator", "text", "entity.name.function.nova-print-method"],
                                regex: "\\b(print)(:)(\\s*)(" + printMethods + ")\\b",
                            },
                            // arg: printMethod inside call args (known print methods)
                            {
                                token: ["identifier", "punctuation.operator", "entity.name.function.nova-print-method"],
                                regex: "([a-zA-Z_$][\\w$]*|[\"'`][^\"'`]*[\"'`])(\\s*:\\s*)(" + printMethods + ")\\b",
                            },
                            // generic arg: method inside call args — e.g. arr(" ": join) or x: join
                            // matches identifier or string/template literal followed by colon then identifier NOT followed by ( or :
                            {
                                token: ["identifier", "punctuation.operator", "entity.name.function.nova-print-method"],
                                regex: "([a-zA-Z_$][\\w$]*|[\"'`][^\"'`]*[\"'`])(\\s*:\\s*)([a-zA-Z_$][\\w$]*)(?!\\s*[(:])",
                            },
                            // type annotation: x: string — colon followed by a type keyword
                            {
                                token: ["punctuation.operator", "text", "storage.type"],
                                regex: "(:)(\\s*)\\b(" + types + ")\\b",
                            },
                            // general colon-method: object: method()
                            {
                                token: ["punctuation.operator", "text", "entity.name.function.nova-method"],
                                regex: "(:)(\\s*)([a-zA-Z_$][\\w$]*)(?=\\s*\\()",
                            },
                            // obj.method() — method after dot
                            {
                                token: ["identifier", "punctuation.operator", "entity.name.function.nova-method"],
                                regex: "([a-zA-Z_$][\\w$]*)(\\.)([a-zA-Z_$][\\w$]*)(?=\\s*\\()",
                            },
                            // operators
                            {
                                token: "keyword.operator",
                                regex: "=>|===|!==|==|!=|<=|>=|\\?\\.|\\?\\.?|\\+\\+|--|\\*\\*|&&|\\|\\||[+\\-*/%&|^~<>!]=?|[=?:]",
                            },
                            // punctuation
                            {
                                token: "punctuation",
                                regex: "[(){}\\[\\],;\\.]",
                            },
                            // identifiers / keywords / builtins / types
                            {
                                token: keywordMapper,
                                regex: "\\b[a-zA-Z_$][\\w$]*\\b",
                            },
                        ],
                        "comment_block": [
                            { token: "comment", regex: "\\*\\/", next: "start" },
                            { defaultToken: "comment" },
                        ],
                        "string_double": [
                            { token: "string", regex: '\\\\.', },
                            { token: "string", regex: '"', next: "start" },
                            { defaultToken: "string" },
                        ],
                        "string_single": [
                            { token: "string", regex: '\\\\.', },
                            { token: "string", regex: "'", next: "start" },
                            { defaultToken: "string" },
                        ],
                        "string_template": [
                            { token: "string", regex: '\\\\.', },
                            { token: "string", regex: "`", next: "start" },
                            { defaultToken: "string" },
                        ],
                    };
            
                    this.normalizeRules();
                };
            
                oop.inherits(NovaHighlightRules, TextHighlightRules);
            
                const NovaMode = function () {
                    ts.Mode.call(this);
                    this.HighlightRules = NovaHighlightRules;
                    this.$id = "ace/mode/nova";
                };
                oop.inherits(NovaMode, ts.Mode);
            
                editor.session.setMode(new NovaMode());
            });
            
            ace.define("ace/theme/nova", ["require", "exports", "module", "ace/lib/dom"], function (require, exports, module) {
                exports.isDark = false;
                exports.cssClass = "ace-nova";
                exports.cssText = `
            .ace-nova .ace_keyword {
                color: #c8622a;
                font-weight: 500;
            }
            .ace-nova .ace_support.ace_function {
                color: #8b4513;
            }
            .ace-nova .ace_string {
                color: #2e7d32;
            }
            .ace-nova .ace_constant.ace_numeric {
                color: #1565c0;
            }
            .ace-nova .ace_comment {
                color: #9e9690;
                font-style: italic;
            }
            .ace-nova .ace_entity.ace_name.ace_function {
                color: #6a3d9a;
                font-style: italic;
            }
            .ace-nova .ace_keyword.ace_operator {
                color: #c8622a;
            }
            .ace-nova .ace_storage.ace_type {
                color: #00695c;
                font-style: italic;
            }
            `;
                const dom = require("ace/lib/dom");
                dom.importCssString(exports.cssText, exports.cssClass);
            });
            
            editor.setTheme("ace/theme/nova");


            const tabs = document.querySelectorAll('.tab');
            const panels = document.querySelectorAll('.panel');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.getAttribute('data-target');
                    tabs.forEach(t => t.classList.remove('active'));
                    panels.forEach(p => p.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(target).classList.add('active');
                });
            });

            const consolePanel = document.getElementById("console");

            function formatLogArg(arg) {
                if (arg === null) return "null";
                if (arg === undefined) return "undefined";

                if (typeof arg === "object") {
                    if (Array.isArray(arg)) {
                        return `[${arg.map(formatLogArg).join(", ")}]`;
                    }

                    try {
                        return JSON.stringify(arg, null, 2);
                    } catch {
                        return String(arg);
                    }
                }

                return String(arg);
            }

            function createTable(data) {
                const table = document.createElement("table");
                table.className = "log-table";

                if (!Array.isArray(data)) data = [data];

                const keys = Object.keys(data[0] || {});
                const thead = document.createElement("thead");
                const trHead = document.createElement("tr");

                keys.forEach(k => {
                    const th = document.createElement("th");
                    th.textContent = k;
                    trHead.appendChild(th);
                });

                thead.appendChild(trHead);
                table.appendChild(thead);

                const tbody = document.createElement("tbody");

                data.forEach(row => {
                    const tr = document.createElement("tr");

                    keys.forEach(k => {
                        const td = document.createElement("td");
                        td.textContent = formatLogArg(row[k]);
                        tr.appendChild(td);
                    });

                    tbody.appendChild(tr);
                });

                table.appendChild(tbody);
                return table;
            }

            function logToPanel(method, ...args) {
                const line = document.createElement("div");
                line.className = "log-line";

                if (method === "error") line.classList.add("log-error");
                else if (method === "warn") line.classList.add("log-warn");
                else if (method === "info") line.classList.add("log-info");
                else if (method === "debug") line.classList.add("log-debug");

                if (method === "table") {
                    const data = args[0];
                    if (data !== null && typeof data === "object") {
                        line.appendChild(createTable(Array.isArray(data) ? data : [data]));
                        consolePanel.appendChild(line);
                        consolePanel.scrollTop = consolePanel.scrollHeight;
                        return;
                    }
                }

                if (method === "error" || method === "warn") {
                    const prefix = document.createElement("span");
                    prefix.className = method === "error" ? "log-prefix-error" : "log-prefix-warn";
                    prefix.textContent = method === "error" ? "✖ " : "⚠ ";
                    line.appendChild(prefix);
                    const text = document.createTextNode(args.map(formatLogArg).join(" "));
                    line.appendChild(text);
                } else {
                    line.textContent = args.map(formatLogArg).join(" ");
                }

                consolePanel.appendChild(line);
                consolePanel.scrollTop = consolePanel.scrollHeight;
            }

            function runNova() {
                const previewIframe = document.getElementById("preview");
                const code = editor.getValue();
                consolePanel.innerHTML = "";
                
                const htmlContent = `<!DOCTYPE html>
                <html>
                <head>
                    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
                    <style>
                        body { margin: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; width: 100dvw; height: 100dvh; overflow: hidden; }
                        canvas { display: block; max-width: 100%; max-height: 100%; object-fit: contain; }
                        * { box-sizing: border-box; }
                    </style>
                </head>
                <body>
                    <script>
                        (function() {
                            const methods = [
                                "log","warn","info","debug",
                                "error","table","dir","trace"
                            ];

                            methods.forEach(method => {
                                const original = console[method];
                                console[method] = function(...args) {
                                    parent.postMessage({
                                        type: "nova-log",
                                        method: method,
                                        data: args
                                    }, "*");

                                    if (original) {
                                        original.apply(console, args);
                                    }
                                };
                            });

                            window.onerror = function(message, source, lineno) {
                                parent.postMessage({
                                    type: "nova-log",
                                    method: "error",
                                    data: [\`Erro: \${message} (Linha \${lineno})\`]
                                }, "*");
                            };

                            window.onunhandledrejection = function(event) {
                                parent.postMessage({
                                    type: "nova-log",
                                    method: "error",
                                    data: [event.reason]
                                }, "*");
                            };
                        })();
                    <\/script>

                    <script src="https://cdn.jsdelivr.net/gh/kazwtto/novajs@main/src/nova.min.js"><\/script>
                    <script type="text/novajs">${code}<\/script>
                </body>
                </html>`;
                
                previewIframe.srcdoc = htmlContent;
            }


            let typingTimer;
            const autoRunSwitch = document.getElementById("auto-run-switch");
            
            editor.session.on('change', () => {
                if (autoRunSwitch.checked) {
                    clearTimeout(typingTimer);
                    typingTimer = setTimeout(runNova, 500);
                }
            });

            document.getElementById("run-btn").addEventListener("click", runNova);

            window.addEventListener("message", (e) => {
                if (e.data && (e.data.type === "nova-log" || e.data.type === "nova-error")) {
                    const method = e.data.method || (e.data.type === "nova-error" ? "error" : "log");
                    logToPanel(method, ...e.data.data);
                }
            });
            
            window.addEventListener('resize', () => {
                editor.resize();
            });
        </script>
    </body>
</html>
